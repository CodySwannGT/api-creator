name: CI Quality Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          # Workaround for npm ci not installing correct platform-specific optional deps
          # See: https://github.com/npm/cli/issues/4828
          npm install --no-save @rollup/rollup-linux-x64-gnu || true

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
