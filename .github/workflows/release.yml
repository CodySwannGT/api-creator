name: Release & Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Configure SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version bump (standard-version)
        id: version
        run: |
          npx standard-version
          TAG=$(git describe --tags --abbrev=0)
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Released $TAG ($VERSION)"

      - name: Push release commit and tag
        run: git push --follow-tags origin main
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for tag to be available
        run: |
          echo "Waiting for tag ${{ needs.release.outputs.tag }}..."
          for i in {1..30}; do
            git fetch --tags
            if git tag --list | grep -q "^${{ needs.release.outputs.tag }}$"; then
              echo "Tag ${{ needs.release.outputs.tag }} is available"
              git checkout "${{ needs.release.outputs.tag }}"
              break
            fi
            echo "Attempt $i/30: Tag not found yet, waiting 10 seconds..."
            sleep 10
          done

          if [ "$(git describe --exact-match --tags 2>/dev/null)" != "${{ needs.release.outputs.tag }}" ]; then
            echo "Error: Tag ${{ needs.release.outputs.tag }} is still not available after 5 minutes"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Get OIDC Token for npm
        id: npm-oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('https://registry.npmjs.org');
            core.setOutput('npm-token', token);
            core.setSecret(token);

      - name: Configure npm with OIDC Token
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ steps.npm-oidc.outputs.npm-token }}" >> ~/.npmrc
          npm config set registry https://registry.npmjs.org

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu || true

      - name: Build
        run: npm run build

      - name: Update package version
        run: npm version "${{ needs.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm with OIDC
        run: npm publish --access public --provenance

      - name: Notify on success
        run: echo "Successfully published @codyswann/api-creator@${{ needs.release.outputs.version }} to npm with provenance"
